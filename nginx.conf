worker_processes 1;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    access_log off;

    upstream api {
        server api1:3000;
        server api2:3000;
        keepalive 64;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}