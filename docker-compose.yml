x-api: &api
  image: zanfranceschi/rinha-de-backend-2026-zan-dotnet:202604290120
  volumes:
    - sock:/run/sock
  deploy:
    resources:
      limits:
        cpus: "0.35"
        memory: "165M"

services:
  api1:
    <<: *api
    environment:
      SOCKET_PATH: /run/sock/api1.sock

  api2:
    <<: *api
    environment:
      SOCKET_PATH: /run/sock/api2.sock

  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - sock:/run/sock
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: "20M"

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0777"
